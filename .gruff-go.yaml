# gruff-go dogfood configuration.
# Hand-tuned for this repository; `gruff-go init` will OVERWRITE this file
# from the stock template and silently wipe project-specific tuning - see
# .goat-flow/footguns/setup.md "init overwrites dogfood config" before regenerating.
# Run `gruff-go list-rules --format json` for the live rule catalogue.
# Fresh start for existing findings: `gruff-go analyse --generate-baseline gruff-baseline.json .`.

schemaVersion: "gruff-go.config.v0.1"

# Discovery reads .gitignore first. paths.ignore is only for committed
# metadata, fixtures, or generated artifacts that should stay out of scans
# even when they are not ignored by Git.
paths:
  ignore:
    - '.agents/**'
    - '.antigravitycli/**'
    - '.claude/**'
    - '.codex/**'
    - '.github/**'
    - '.goat-flow/**'
    - 'internal/rule/sensitive_test.go'
    - 'internal/report/sensitive_redaction_test.go'

# Project-wide allowlists for noisy signals.
# acceptedAbbreviations relax naming.acronym-case; secretPreviews lists path
# globs where sensitive-data rules may include the matched preview.
allowlists:
  acceptedAbbreviations:
    - ID
    - HTTP
    - JSON
    - CLI
    - AST
  secretPreviews: []

# Selection narrows the active rule set. Empty lists keep the default
# selection (every rule below whose `enabled` is true).
selection:
  rules: []
  excludeRules: []
  pillars: []
  excludePillars: []

rules:
  # Nested control flow and boolean decisions add review cost even when branch
  # count alone is below the cyclomatic threshold.
  complexity.cognitive:
    enabled: true
    severity: warning
    threshold: 35

  # Too many branches make a function harder to test and safely change.
  complexity.cyclomatic:
    enabled: true
    severity: warning
    threshold: 20

  # Deeply nested control flow hides edge cases and makes review slower.
  # Dogfood threshold is one stricter than the default (4 vs 5).
  complexity.nesting-depth:
    enabled: true
    severity: warning
    threshold: 4

  # Empty control-flow blocks usually mean unfinished or obsolete logic.
  # Escalated above default (warning vs notice) for this project.
  dead-code.empty-block:
    enabled: true
    severity: warning

  # Statements after terminal control flow are dead code and often hide stale logic.
  dead-code.unreachable-code:
    enabled: true
    severity: notice

  # Size plus complexity on the same function marks a structural refactor candidate.
  design.god-function:
    enabled: true
    severity: notice

  # Files with findings across multiple pillars deserve whole-file triage.
  design.hotspot-file:
    enabled: true
    severity: notice
    thresholds:
      minFindings: 3
      minPillars: 2

  # Dogfood scans hold maintainer-facing comments to a stricter floor than the
  # default rule pack: every declaration needs context, and every package needs
  # a summary. minWordsBeyondSymbol rejects comments that mostly restate names.
  docs.comment-rubric:
    enabled: true
    severity: warning
    threshold: 2
    options:
      requirePackageSummary: true
      requireFunctionComments: true
      requireNamedTypeComments: true
      requireConstComments: true
      requireVarComments: true
      ignoreTests: false
      minWordsBeyondSymbol: 3

  # Exported struct fields should explain the config/report contracts they expose.
  # Escalated above default (warning vs notice) for this project.
  docs.config-field-comment:
    enabled: true
    severity: warning

  # Exported API symbols should carry Go doc comments for downstream readers.
  # ignoreInternalPackages keeps internal/ package symbols out of scope.
  docs.exported-symbol-comment:
    enabled: true
    severity: notice
    options:
      ignoreInternalPackages: true

  # Package comments give godoc users a clear entry point for each package.
  docs.package-comment:
    enabled: true
    severity: notice

  # TODO contexts in production code leave cancellation ownership ambiguous.
  maintainability.context-todo-production:
    enabled: true
    severity: notice

  # Error-looking values assigned to `_` should be handled or justified.
  maintainability.ignored-error:
    enabled: true
    severity: notice

  # Reusable production code should return errors rather than panic with literal messages.
  maintainability.production-panic:
    enabled: true
    severity: notice

  # io/ioutil has direct io/os replacements in modern Go.
  modernisation.ioutil-deprecated:
    enabled: true
    severity: notice

  # Flags identifiers that spell configured Go initialisms with mixed casing.
  naming.acronym-case:
    enabled: true
    severity: notice

  # Flags generic range variables and accumulator names only when surrounding context is large enough that the name loses meaning.
  naming.contextual-generic:
    enabled: true
    severity: notice
    thresholds:
      minBodyLines: 15
      minFunctionLines: 50

  # Flags receiver accessor methods that use a Get prefix instead of a direct noun phrase.
  naming.get-prefix:
    enabled: true
    severity: notice

  # Placeholder names such as tmp or obj hide the role an identifier plays.
  naming.identifier-quality:
    enabled: true
    severity: notice
    options:
      placeholderNames:
        - foo
        - bar
        - baz
        - tmp
        - temp
        - obj
        - todo
        - thing
        - stuff

  # Flags identifiers, doc comments, and struct tags containing common programming misspellings.
  naming.misspelling:
    enabled: true
    severity: notice

  # Flags boolean identifiers whose names start with negation prefixes (No, Not, Disable, etc.), which force double-negation at call sites.
  naming.negated-boolean:
    enabled: true
    severity: notice

  # Flags exported identifiers whose lowercase form starts with their own package name (config.ConfigOptions, rule.RuleRegistry).
  naming.package-stutter:
    enabled: true
    severity: notice

  # Go package names should be short lowercase words without underscores.
  naming.package-underscore:
    enabled: true
    severity: notice

  # Flags methods on the same type that use inconsistent receiver names or pointer/value forms.
  naming.receiver-consistency:
    enabled: true
    severity: notice

  # Archive entry names must stay contained inside the extraction root.
  security.archive-path-traversal:
    enabled: true
    severity: notice

  # HTTP clients should have explicit timeout ownership.
  security.http-client-no-timeout:
    enabled: true
    severity: notice

  # math/rand must not generate tokens, nonces, sessions, keys, or other secrets.
  security.insecure-random-secret:
    enabled: true
    severity: notice

  # Request bodies should be size-limited before full reads.
  security.request-body-without-limit:
    enabled: true
    severity: notice

  # Shell-routed exec.Command calls can turn string interpolation into command injection.
  # Escalated above default (error vs warning) for this project.
  security.shell-command:
    enabled: true
    severity: error

  # Dynamically constructed SQL query strings are injection-prone.
  security.sql-string-query:
    enabled: true
    severity: notice

  # TLS configs that disable verification or allow obsolete protocols expose traffic.
  security.tls-insecure-config:
    enabled: true
    severity: warning

  # Weak crypto primitives need explicit security review before use.
  security.weak-crypto:
    enabled: true
    severity: notice

  # Anthropic API keys grant model access billed against the owning org.
  sensitive-data.anthropic-api-key:
    enabled: true
    severity: error

  # AWS access key IDs in source can expose cloud credentials.
  sensitive-data.aws-access-key:
    enabled: true
    severity: error

  # Connection strings with embedded passwords leak direct service access.
  sensitive-data.connection-string:
    enabled: true
    severity: error

  # GCP service-account JSON key files leak full impersonation rights.
  sensitive-data.gcp-service-account:
    enabled: true
    severity: critical

  # GitHub PAT / OAuth / user / server / refresh tokens leak repo and org access.
  sensitive-data.github-token:
    enabled: true
    severity: error

  # Google API keys grant access to GCP services billed against the owning project.
  sensitive-data.google-api-key:
    enabled: true
    severity: error

  # JWT-shaped literals in source can expose signed tokens or test data copied from production.
  sensitive-data.jwt-token:
    enabled: true
    severity: error

  # Private keys in source require immediate rotation and removal.
  sensitive-data.private-key:
    enabled: true
    severity: critical

  # Secret-like assignments catch broad API key, token, and password patterns.
  sensitive-data.secret-pattern:
    enabled: true
    severity: error

  # Slack bot / user / app / refresh tokens leak workspace access.
  sensitive-data.slack-token:
    enabled: true
    severity: error

  # Stripe live secret / publishable / restricted keys move real money.
  sensitive-data.stripe-key:
    enabled: true
    severity: error

  # Very large files slow navigation and usually mix responsibilities.
  size.file-length:
    enabled: true
    severity: warning
    threshold: 500

  # Long functions are harder to understand, test, and refactor.
  size.function-length:
    enabled: true
    severity: warning
    threshold: 80

  # Long parameter lists make call sites brittle and suggest an options struct.
  # Dogfood threshold is stricter than the default (5 vs 8) and escalated to warning.
  size.parameter-count:
    enabled: true
    severity: warning
    threshold: 5

  # Empty tests create false confidence without exercising behavior.
  # Escalated above default (warning vs notice) for this project.
  test-quality.empty-test:
    enabled: true
    severity: warning

  # Test helpers that can fail should call t.Helper for accurate failure lines.
  test-quality.helper-missing-t-helper:
    enabled: true
    severity: notice

  # Tests need a path that can fail, not just execute code.
  test-quality.no-failure-path:
    enabled: true
    severity: notice

  # Legacy Go modules should shadow range variables before parallel table-subtest capture.
  test-quality.parallel-range-capture:
    enabled: true
    severity: notice

  # Skipped tests should stay visible so they do not become hidden debt.
  test-quality.skipped-test:
    enabled: true
    severity: notice

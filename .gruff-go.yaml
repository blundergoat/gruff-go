# gruff-go dogfood configuration.
# Hand-tuned for this repository; `gruff-go init --force` safely merges existing
# tuning and adds new registry rules, while `--force --reset` discards local tuning.
# Run `gruff-go list-rules --format json` for the live rule catalogue.
# Fresh start for existing findings: `gruff-go analyse --generate-baseline gruff-baseline.json .`.

schemaVersion: "gruff-go.config.v0.1"

# Discovery reads .gitignore first. paths.ignore is only for committed
# metadata, fixtures, or generated artifacts that should stay out of scans
# even when they are not ignored by Git.
paths:
  ignore:
    - '.agents/**'
    - '.antigravitycli/**'
    - '.claude/**'
    - '.codex/**'
    - '.github/**'
    - '.goat-flow/**'
    - internal/report/sensitive_redaction_test.go
    - internal/rule/sensitive_test.go

# Project-wide allowlists for noisy signals.
# acceptedAbbreviations relax naming.acronym-case; secretPreviews lists path
# globs where sensitive-data rules may include the matched preview.
allowlists:
  acceptedAbbreviations:
    - AST
    - CLI
    - HTTP
    - ID
    - JSON
  secretPreviews: []

# Selection narrows the active rule set. Empty lists keep the default
# selection (every rule below whose `enabled` is true).
selection:
  rules: []
  excludeRules: []
  pillars: []
  excludePillars: []

rules:
  # Flags functions whose nested control flow and boolean decisions exceed the configured cognitive complexity threshold.
  complexity.cognitive:
    enabled: true
    severity: warning
    threshold: 35

  # Flags Go functions whose branch count exceeds the default cyclomatic threshold.
  complexity.cyclomatic:
    enabled: true
    severity: warning
    threshold: 20

  # Flags functions whose maximum control-flow nesting depth exceeds the configured threshold. Function literals reset the count.
  complexity.nesting-depth:
    enabled: true
    severity: warning
    threshold: 4

  # Flags functions whose acyclic execution-path count exceeds the configured cap.
  # gruff-go raises the default (1024) because the scanner's own dispatchers
  # (rule registry switches, config validators, comment-rubric aggregators)
  # have legitimately wide branch fan-out that the modified NPath formula
  # still scores high. Adopter projects with leaner code should keep the
  # default; lower it deliberately to surface combinatorial blowup.
  complexity.npath:
    enabled: true
    severity: warning
    threshold: 9000

  # Flags empty control-flow blocks that usually indicate unfinished or unnecessary code.
  dead-code.empty-block:
    enabled: true
    severity: warning

  # Flags statements that appear after return, panic, break, continue, or goto in the same block.
  dead-code.unreachable-code:
    enabled: true
    severity: advisory

  # Flags functions that already have both size and complexity findings, prioritising routines that need structural decomposition.
  design.god-function:
    enabled: true
    severity: advisory

  # Flags files with findings across multiple quality pillars, highlighting cross-cutting maintenance hotspots.
  design.hotspot-file:
    enabled: true
    severity: advisory
    thresholds:
      minFindings: 3
      minPillars: 2

  # Flags files that opt into stricter maintainer comments for package summaries, functions, named types, and package-scope values. With minWordsBeyondSymbol set, the rule additionally requires the comment to carry that many tokens beyond the symbol's own name (rejects name-restatement boilerplate). On _test.go files the rule does not enforce requireConstComments or requireVarComments even when ignoreTests is false; function, type, and package-summary checks still apply.
  docs.comment-rubric:
    enabled: true
    severity: warning
    threshold: 2
    options:
      ignoreTests: false
      minWordsBeyondSymbol: 3
      requireConstComments: true
      requireFunctionComments: true
      requireNamedTypeComments: true
      requirePackageSummary: true
      requireVarComments: true

  # Flags exported fields on struct types in configured includePaths that have no useful doc comment. Embedded and unexported fields are out of scope.
  docs.config-field-comment:
    enabled: true
    severity: warning

  # Flags exported top-level Go declarations (functions, methods on exported types, types, vars, consts) that have no doc comment.
  docs.exported-symbol-comment:
    enabled: true
    severity: advisory
    options:
      ignoreInternalPackages: true

  # Flags Go packages that do not have a package-level comment in any file.
  docs.package-comment:
    enabled: true
    severity: advisory

  # Flags nolint and nosec suppression comments that do not explain why the suppression is intentional.
  docs.suppression-without-rationale:
    enabled: true
    severity: advisory

  # Flags context.TODO calls in production files where cancellation ownership should be explicit.
  maintainability.context-todo-production:
    enabled: true
    severity: advisory

  # Flags defer statements directly inside loops, where cleanup is delayed until the enclosing function returns.
  maintainability.defer-in-loop:
    enabled: true
    severity: advisory

  # Flags error-looking values that are assigned directly to the blank identifier.
  maintainability.ignored-error:
    enabled: true
    severity: advisory

  # Flags log.Fatal and os.Exit calls outside command entrypoints and tests.
  maintainability.log-fatal-library:
    enabled: true
    severity: advisory

  # Flags storing, returning, or appending the address of a range variable copy.
  maintainability.loop-variable-address:
    enabled: true
    severity: advisory

  # Flags direct literal panic calls in non-test, non-main production code.
  maintainability.production-panic:
    enabled: true
    severity: advisory

  # Flags calls to io/ioutil APIs that have direct io or os replacements in modern Go.
  modernisation.ioutil-deprecated:
    enabled: true
    severity: advisory

  # Flags identifiers that spell configured Go initialisms with mixed casing.
  naming.acronym-case:
    enabled: true
    severity: advisory

  # Flags generic range variables and accumulator names only when surrounding context is large enough that the name loses meaning.
  naming.contextual-generic:
    enabled: true
    severity: advisory
    thresholds:
      minBodyLines: 15
      minFunctionLines: 50

  # Flags receiver accessor methods that use a Get prefix instead of a direct noun phrase.
  naming.get-prefix:
    enabled: true
    severity: advisory

  # Flags local variables and constants whose names match a list of placeholder tokens that rarely survive a careful review.
  naming.identifier-quality:
    enabled: true
    severity: advisory
    options:
      placeholderNames:
        - foo
        - bar
        - baz
        - tmp
        - temp
        - obj
        - todo
        - thing
        - stuff

  # Flags identifiers, doc comments, and struct tags containing common programming misspellings.
  naming.misspelling:
    enabled: true
    severity: advisory

  # Flags boolean identifiers whose names start with negation prefixes (No, Not, Disable, etc.), which force double-negation at call sites.
  naming.negated-boolean:
    enabled: true
    severity: advisory

  # Flags exported identifiers whose lowercase form starts with their own package name (config.ConfigOptions, rule.RuleRegistry).
  naming.package-stutter:
    enabled: true
    severity: advisory

  # Flags Go package names that use underscores instead of short lowercase words.
  naming.package-underscore:
    enabled: true
    severity: advisory

  # Flags methods on the same type that use inconsistent receiver names or pointer/value forms.
  naming.receiver-consistency:
    enabled: true
    severity: advisory

  # Flags archive extraction paths built from entry names without an obvious containment check.
  security.archive-path-traversal:
    enabled: true
    severity: advisory

  # Flags http.Client composite literals in production files that do not set Timeout.
  security.http-client-no-timeout:
    enabled: true
    severity: advisory

  # Flags production http.Server literals and ListenAndServe helpers that do not set explicit timeout controls.
  security.http-server-no-timeout:
    enabled: true
    severity: advisory

  # Flags math/rand use when the result is assigned to or returned from token, nonce, session, password, key, or other secret-looking contexts.
  security.insecure-random-secret:
    enabled: true
    severity: advisory

  # Flags os file and directory calls that use world-writable or overly permissive literal modes.
  security.permissive-file-mode:
    enabled: true
    severity: advisory

  # Flags io.ReadAll-style reads of http.Request.Body in production handlers without nearby MaxBytesReader or LimitReader evidence.
  security.request-body-without-limit:
    enabled: true
    severity: advisory

  # Flags exec.Command calls that invoke a shell interpreter with command strings.
  security.shell-command:
    enabled: true
    severity: error

  # Flags SQL execution calls whose query argument is constructed with string formatting or concatenation.
  security.sql-string-query:
    enabled: true
    severity: advisory

  # Flags tls.Config literals that disable certificate verification or allow obsolete TLS protocol versions.
  security.tls-insecure-config:
    enabled: true
    severity: warning

  # Flags MD5/SHA1 in security-looking contexts, direct DES/RC4 construction, and RSA key generation below 2048 bits.
  security.weak-crypto:
    enabled: true
    severity: advisory

  # Flags Anthropic API keys (sk-ant- prefix) embedded in source or text files.
  sensitive-data.anthropic-api-key:
    enabled: true
    severity: error

  # Flags AWS access key identifiers (AKIA...) embedded in source or text files.
  sensitive-data.aws-access-key:
    enabled: true
    severity: error

  # Flags database/queue connection URLs that embed a username and password in the URI.
  sensitive-data.connection-string:
    enabled: true
    severity: error

  # Flags files containing both a `"type": "service_account"` marker and a PEM private-key header - the documented shape of a GCP service-account JSON key file. Fires independently of sensitive-data.private-key, so a real key file produces two findings.
  sensitive-data.gcp-service-account:
    enabled: true
    severity: error

  # Flags GitHub personal-access, OAuth, user-to-server, server-to-server, and refresh tokens (gh[pousr]_ prefix) embedded in source or text files.
  sensitive-data.github-token:
    enabled: true
    severity: error

  # Flags GitLab personal, trigger, runner, and application tokens (glpat-, glptt-, glrt-, gloas-) embedded in source or text files.
  sensitive-data.gitlab-token:
    enabled: true
    severity: error

  # Flags Google API keys (AIza prefix plus 35 base64url characters) embedded in source or text files.
  sensitive-data.google-api-key:
    enabled: true
    severity: error

  # Flags JWT-shaped literals (three base64url segments separated by dots) embedded in source or text files.
  sensitive-data.jwt-token:
    enabled: true
    severity: error

  # Flags npm access tokens (npm_ and npm_pat_ prefixes) embedded in source or text files.
  sensitive-data.npm-token:
    enabled: true
    severity: error

  # Flags PEM-encoded private keys embedded directly in source or text files.
  sensitive-data.private-key:
    enabled: true
    severity: error

  # Flags high-risk secret-like key/value assignments in Go and text/config files.
  sensitive-data.secret-pattern:
    enabled: true
    severity: error

  # Flags Slack bot, user, app, and refresh tokens (xox[bpar]- prefix) embedded in source or text files.
  sensitive-data.slack-token:
    enabled: true
    severity: error

  # Flags Stripe secret, publishable, and restricted live-environment keys ((sk|pk|rk)_live_ prefix) embedded in source or text files.
  sensitive-data.stripe-key:
    enabled: true
    severity: error

  # Flags Go files that exceed the default line-count threshold.
  size.file-length:
    enabled: true
    severity: warning
    threshold: 500

  # Flags Go functions that exceed the default line-count threshold.
  size.function-length:
    enabled: true
    severity: warning
    threshold: 80

  # Flags functions and methods whose parameter list exceeds the configured maximum, excluding the method receiver.
  size.parameter-count:
    enabled: true
    severity: warning
    threshold: 5

  # Flags Go test functions whose body contains no executable statements.
  test-quality.empty-test:
    enabled: true
    severity: warning

  # Flags t.Fatal, t.Fatalf, and t.FailNow calls inside goroutines where they do not stop the parent test safely.
  test-quality.fatal-in-goroutine:
    enabled: true
    severity: advisory

  # Flags non-test helper functions that accept testing.TB, *testing.T, or *testing.B and can fail the test but never call Helper.
  test-quality.helper-missing-t-helper:
    enabled: true
    severity: advisory

  # Flags Go test functions that contain executable statements but never reach a failure call (t.Error, t.Fatal, t.Fail, etc.).
  test-quality.no-failure-path:
    enabled: true
    severity: advisory

  # Flags t.Parallel subtests that close over range variables without an explicit shadow copy in modules using pre-Go 1.22 loop-variable semantics.
  test-quality.parallel-range-capture:
    enabled: true
    severity: advisory

  # Flags Go tests that call t.Skip, t.Skipf, or t.SkipNow.
  test-quality.skipped-test:
    enabled: true
    severity: advisory

  # Flags os.MkdirTemp and ioutil.TempDir calls in tests when t.TempDir is available.
  test-quality.tempdir-misuse:
    enabled: true
    severity: advisory

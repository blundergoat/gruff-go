paths:
  ignore: []

allowlists:
  acceptedAbbreviations:
    - ID
    - HTTP
    - JSON
    - CLI
    - AST
  secretPreviews: []

selection:
  rules: []
  excludeRules: []
  pillars: []
  excludePillars: []

rules:
  complexity.cyclomatic:
    enabled: true
    threshold: 20
    severity: warning
  documentation.package-comment:
    enabled: true
    severity: notice
  sensitive-data.secret-pattern:
    enabled: true
    severity: error
  size.file-length:
    enabled: true
    threshold: 400
    severity: warning
  size.function-length:
    enabled: true
    threshold: 80
    severity: warning
  naming.package-underscore:
    enabled: false
  security.shell-command:
    enabled: false
  test-quality.skipped-test:
    enabled: false
  dead-code.empty-block:
    enabled: false
